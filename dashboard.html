<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Dashboard | NurseSync</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background-color: var(--bg-alt); }
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: var(--space-4);
            z-index: 1000;
        }
        .main-content {
            margin-left: 280px;
            padding: var(--space-4);
        }
        .nav-link-dashboard {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            transition: var(--transition-base);
        }
        .nav-link-dashboard:hover, .nav-link-dashboard.active {
            background-color: var(--primary);
            color: white;
        }
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>

    <!-- Header / Navbar (Standardized) -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-heart-pulse-fill text-primary me-2"></i>
                <span class="fw-bold">NURSE<span class="text-primary">SYNC</span></span>
            </a>
            <div class="d-flex align-items-center gap-3">
                 <a href="login.html" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
        <nav>
            <a href="#" class="nav-link-dashboard active" onclick="switchTab('overview')">
                <i class="bi bi-grid"></i>
                <span class="nav-text">Overview</span>
            </a>
            <a href="#" class="nav-link-dashboard" onclick="switchTab('assignments')">
                <i class="bi bi-hospital"></i>
                <span class="nav-text">Assignments</span>
            </a>
            <a href="#" class="nav-link-dashboard" onclick="switchTab('compliance')">
                <i class="bi bi-file-check"></i>
                <span class="nav-text">Compliance</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 id="tab-title" class="mb-0">Overview</h2>
                <p class="text-muted">Welcome back, Nurse Jane!</p>
            </div>
        </header>

        <div id="overview-content" class="dashboard-tab">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="custom-card shadow-sm">
                        <p class="text-muted mb-1">Active Assignment</p>
                        <h3>NYC Medical Center</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="custom-card shadow-sm">
                        <p class="text-muted mb-1">Compliance Status</p>
                        <h3 class="text-success">95% Complete</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="custom-card shadow-sm">
                        <p class="text-muted mb-1">Earnings</p>
                        <h3>$4,800.00</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer (Restricted) -->
    <footer class="footer bg-dark text-white py-3 text-center" style="margin-left: 280px;">
        <p class="mb-0">&copy; 2026 NurseSync. All Rights Reserved.</p>
    </footer>

    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>

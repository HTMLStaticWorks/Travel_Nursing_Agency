<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NurseSync Portal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-brand {
            text-decoration: none;
            color: #111827;
            margin-bottom: 1rem;
            justify-content: center;
        }

        .auth-brand .brand-mark {
            font-size: 1.5rem;
        }

        .auth-brand .brand-name {
            font-size: 1.5rem;
            letter-spacing: 0.02em;
        }

        .auth-card {
            max-width: 650px;
            margin: 0 1rem;
        }
    </style>
</head>
<body>

    <div class="auth-container d-flex flex-column align-items-center">
        <div class="custom-card auth-card shadow-lg">
            <div class="text-center mb-5">
                <a class="auth-brand d-inline-flex align-items-center" href="index.html" aria-label="NurseSync Home">
                    <i class="bi bi-heart-pulse-fill text-primary me-2 brand-mark"></i>
                    <span class="fw-bold brand-name mb-0">NURSE<span class="text-primary">SYNC</span></span>
                </a>
                <h2 class="fw-bold">Start Your Journey</h2>
                <p class="text-muted">Create your nurse profile today</p>
            </div>
            
            <form class="needs-validation auth-form" novalidate action="dashboard.html">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control auth-control w-100" placeholder="Jane Doe" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Nursing Specialty</label>
                        <select class="form-select auth-control w-100" required>
                            <option value="" selected disabled>Choose...</option>
                            <option>ICU</option>
                            <option>ER</option>
                            <option>Med-Surg</option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control auth-control w-100" placeholder="nurse@example.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <div class="input-group auth-password-group">
                            <input type="password" class="form-control auth-control w-100" id="password" required>
                            <button class="btn btn-outline-secondary" type="button" data-password-toggle="password" aria-label="Show password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group auth-password-group">
                            <input type="password" class="form-control auth-control w-100" id="confirmPassword" required>
                            <button class="btn btn-outline-secondary" type="button" data-password-toggle="confirmPassword" aria-label="Show confirm password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="termsAgreement" required>
                            <label class="form-check-label text-muted" for="termsAgreement">
                                I agree to the <a href="#" class="text-primary text-decoration-none fw-bold">Terms and Conditions</a>
                            </label>
                            <div class="invalid-feedback">
                                You must agree to the terms before creating your profile.
                            </div>
                        </div>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary-custom auth-control auth-action w-100 mb-2">Create Profile</button>
                        <div class="d-flex align-items-center my-3">
                            <hr class="flex-grow-1 opacity-25">
                            <span class="mx-3 text-muted small">OR</span>
                            <hr class="flex-grow-1 opacity-25">
                        </div>
                        <button type="button" class="btn btn-outline-secondary auth-control auth-action w-100 mb-3 text-dark fw-bold d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-google text-danger"></i> Continue with Google
                        </button>
                        <button type="button" class="btn btn-outline-secondary auth-control auth-action w-100 mb-4 text-dark fw-bold d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-apple fs-4"></i> Continue with Apple
                        </button>
                        <div class="text-center text-muted">
                            Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Login Here</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.querySelectorAll('[data-password-toggle]').forEach((button) => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-password-toggle');
                const input = document.getElementById(targetId);
                const icon = button.querySelector('i');
                const isPassword = input.type === 'password';

                input.type = isPassword ? 'text' : 'password';
                icon.classList.toggle('bi-eye', !isPassword);
                icon.classList.toggle('bi-eye-slash', isPassword);
                button.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            });
        });
    </script>

</body>
</html>

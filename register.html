<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NurseSync Portal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-alt);
            padding: var(--space-5) 0;
        }
        .auth-card {
            max-width: 650px;
            width: 100%;
            padding: var(--space-5);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="custom-card auth-card shadow-lg">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Start Your Journey</h2>
                <p class="text-muted">Create your nurse profile today</p>
            </div>
            
            <form class="needs-validation" novalidate action="dashboard.html">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Jane Doe" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nursing Specialty</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Choose...</option>
                            <option>ICU</option>
                            <option>ER</option>
                            <option>Med-Surg</option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="nurse@example.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" required>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-2">Create Profile</button>
                        <div class="d-flex align-items-center my-3">
                            <hr class="flex-grow-1 opacity-25">
                            <span class="mx-3 text-muted small">OR</span>
                            <hr class="flex-grow-1 opacity-25">
                        </div>
                        <button type="button" class="btn btn-outline-secondary w-100 py-3 mb-4 text-dark fw-bold d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-google text-danger"></i> Continue with Google
                        </button>
                        <div class="text-center text-muted">
                            Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Login Here</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

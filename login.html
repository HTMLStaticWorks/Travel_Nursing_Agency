<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NurseSync Portal</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-card {
            max-width: 450px;
            margin: 0 1rem;
        }
    </style>
</head>
<body>

    <div class="auth-container d-flex flex-column align-items-center">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center mb-4" href="index.html">
            <i class="bi bi-heart-pulse-fill text-primary me-2" style="font-size: 1.5rem;"></i>
            <span class="fw-bold h4 mb-0">NURSE<span class="text-primary">SYNC</span></span>
        </a>

        <div class="custom-card auth-card shadow-lg">
            <div class="text-center mb-5">
                <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-3">Welcome Back</h2>
                <p class="text-muted">Login to your NurseSync Portal</p>
            </div>
            
            <form class="needs-validation auth-form" novalidate action="dashboard.html">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control auth-control w-100" placeholder="nurse@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control auth-control w-100" placeholder="••••••••" required>
                </div>
                <div class="d-flex align-items-center justify-content-between gap-3 mb-4 flex-wrap">
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label text-muted" for="rememberMe">
                            Remember Me
                        </label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none ms-auto">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary-custom auth-control auth-action w-100 mb-2">Login Now</button>
                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1 opacity-25">
                    <span class="mx-3 text-muted small">OR</span>
                    <hr class="flex-grow-1 opacity-25">
                </div>
                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-outline-secondary auth-control auth-action w-100 text-dark fw-bold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-google text-danger"></i> Continue with Google
                    </button>
                    <button type="button" class="btn btn-dark auth-control auth-action w-100 text-white fw-bold d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-apple fs-4"></i> Continue with Apple
                    </button>
                </div>
                <div class="text-center text-muted">
                    Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-bold">Apply Here</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
